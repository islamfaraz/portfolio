name: Build CV from LaTeX

on:
  push:
    paths:
      - 'cv/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: FarazCV.tex
          working_directory: cv
          latexmk_use_lualatex: true

      - name: Copy PDF to assets
        run: cp cv/FarazCV.pdf assets/Faraz_Islam_CV.pdf

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/Faraz_Islam_CV.pdf
          if git diff --cached --quiet; then
            echo "No changes to PDF — skipping commit."
          else
            git commit -m "chore: auto-build CV from LaTeX source"
            git push
          fi
